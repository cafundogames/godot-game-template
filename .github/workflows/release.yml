name: Godot App Release

on:
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        description: Publish to ItchIo?
        default: false

env:
  pname: "godot-game-template" # package name; preferably in kebab-case; WARN: MUST BE THE SAME AS THE PNAME ON THE FLAKE.NIX AND project.config.json
  version: "1.0.0" # game version; will be grabbed from project.config.json
  name: "Godot Game Template" # game human-readable name; will be grabbed from project.config.json
  itch-user: "cafundogames" # itchio username; for itchio publishing
  extra-channel: '["stable"]' # extra itchio channel names; eg. pname-linux-stable, pname-windows-beta, pname-web-demo; should be a valid json array

defaults:
  run:
    shell: nu {0}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        preset: ["linux", "windows", "web"]

    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: cafundogames
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: hustcer/setup-nu@v3
        with:
          version: "0.112.2"
          enable-plugins: true

      - name: Get Info
        run: |
          let preset = ${{matrix.preset}}
          let version = open project.config.json | get version? | default $env.version? | default '1.0.0'
          let name = open project.config.json | get name? | default $env.name? | default 'Godot Game Template'
          let pname = open project.config.json | get pname? | default $env.pname? | default 'godot-game-template'
          $"preset=($preset)
          version=($version)
          name=($name)
          pname($pname)" | save -a $env.GITHUB_ENV

      - name: Build ${{matrix.preset}} preset
        run: nix build .#${{matrix.preset}}

      - name: preparing zips
        run: |
          mkdir -v ./out/($env.pname)
          cp -rv ./result/share/($env.pname)/* ./out/($env.pname)
          cd ./out/($env.pname)
          ^zip ../($env.pname)-($env.preset).zip *

      - name: Upload package to GitHub release
        uses: ncipollo/release-action@v1.20.0
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ./out/${{env.pname}}-${{matrix.preset}}.zip
          artifactContentType: zip
          bodyFile: ./bodyfile.md
          tag: ${{ env.version }}
          name: "${{ env.name }} ${{ env.version }}"

      - name: setup butler
        if: env.itch-user != ''
        uses: remarkablegames/setup-butler@v2
        with:
          butler-version: LATEST

      - name: upload to itch
        if: env.itch-user != ''
        run: |
          let extra-channel = $env.extra-channel | from json
          ^butler push --fix-permissions --userversion=$env.version ./out/($env.pname) \
            [$"($env.itch-user)/($env.pname):($env.preset)" ...$extra-channel] | str join "-"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
